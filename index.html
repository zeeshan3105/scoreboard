<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1 id="timer">00:00</h1>
    <h2 id="heading">Click On Start Game button To Start The Timer</h2>
    <div class="main">
        <section>
            <div class="home">
                <h1>Argentina</h1>
                <div class="homeScore"><p id="homeScore">0</p></div>
                <div class="buttons">
                    <button id="add1Home">+1</button>
                    <button id="add2Home">+2</button>
                    <button id="add3Home">+3</button>
                </div>
            </div>
        </section>
        <section>
            <div class="guest">
                <h1>Egypt</h1>
                <div class="guestScore"><p id="guestScore">0</p></div>
                <div class="buttons">
                    <button id="add1Guest">+1</button>
                    <button id="add2Guest">+2</button>
                    <button id="add3Guest">+3</button>
                </div>
            </div>
        </section>
    </div>
    <div class="newButtons">
    <button id="newGame">New Game</button>
    <button id="startGame">Start Game</button>
    <button id="endGame">End Game</button>
    </div>
    <script src="./script.js"></script>
</body>

</html>
